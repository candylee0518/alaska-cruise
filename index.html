<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>阿拉斯加郵輪之旅</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #e6f2f8; /* 延伸自圖片的淡藍冰雪色 */
        }
        .banner-mask {
            height: 250px;
            overflow: hidden;
        }
        .content-card {
            margin-top: -30px; /* 向上拉動與圖片重疊 */
            border-radius: 30px 30px 0 0;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(8px);
        }
    </style>
</head>
<body>
    <div id="app" class="max-w-md mx-auto min-h-screen shadow-2xl relative bg-[#e6f2f8] pb-10">
        
        <header class="relative banner-mask">
            <img src="alaska.jpg" alt="Alaska Cruise" class="w-full h-full object-cover">
            <div class="absolute bottom-0 left-0 w-full h-16 bg-gradient-to-t from-[#e6f2f8] to-transparent"></div>
        </header>

        <main class="relative z-10 content-card bg-white min-h-[500px] px-6 pt-8">
            <div class="flex justify-between items-center mb-6">
                <div>
                    <h1 class="text-2xl font-bold text-slate-700">阿拉斯加郵輪行程</h1>
                    <p class="text-blue-400 text-sm">Family Expedition 2026</p>
                </div>
                <div class="bg-blue-50 p-2 rounded-full">
                    <span class="text-blue-500 font-bold">14 Days</span>
                </div>
            </div>

            <div class="space-y-6">
                <div v-for="(item, index) in schedule" :key="index" class="relative pl-8 border-l-2 border-blue-100 pb-2">
                    <div class="absolute -left-[9px] top-0 w-4 h-4 rounded-full border-2 border-blue-400 bg-white"></div>
                    
                    <div class="flex flex-col">
                        <span class="text-xs font-bold text-blue-300 uppercase tracking-widest">{{ item.time }}</span>
                        <h3 class="text-lg font-medium text-slate-800 mb-2">{{ item.title }}</h3>
                        
                        <div class="glass-card rounded-2xl p-4 border border-blue-50 shadow-sm transition active:scale-95">
                            <p class="text-sm text-slate-500 mb-3">{{ item.desc }}</p>
                            <a :href="getGoogleMapsUrl(item.location)" target="_blank" class="flex items-center justify-center w-full bg-blue-500 text-white py-2 rounded-xl text-sm font-medium gap-2">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>
                                開啟 Google Maps 導航
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <nav class="fixed bottom-0 max-w-md w-full bg-white/90 backdrop-blur-md border-t border-slate-100 flex justify-around py-3 z-50">
            <button class="text-blue-500 flex flex-col items-center">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
                <span class="text-[10px] mt-1">首頁</span>
            </button>
            <button class="text-slate-400 flex flex-col items-center">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>
                <span class="text-[10px] mt-1">行程</span>
            </button>
            <button class="text-slate-400 flex flex-col items-center">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10"/></svg>
                <span class="text-[10px] mt-1">重要文件</span>
            </button>
        </nav>
    </div>

    <script>
        const { createApp, ref } = Vue;
        createApp({
            setup() {
                const schedule = ref([
                    { time: 'Day 1 - 10:00 AM', title: '溫哥華港口登船', desc: '辦理登船手續，展開阿拉斯加之旅', location: 'Canada Place, Vancouver' },
                    { time: 'Day 2 - 08:00 AM', title: '內灣航道巡航', desc: '觀賞壯觀的冰河景觀與野生動物', location: 'Inside Passage, Alaska' },
                    { time: 'Day 3 - 01:00 PM', title: '凱契根停留', desc: '漫步溪街，探索鮭魚之都', location: 'Ketchikan, Alaska' }
                ]);

                const getGoogleMapsUrl = (location) => {
                    return `https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(location)}`;
                };

                return { schedule, getGoogleMapsUrl };
            }
        }).mount('#app');
    </script>
</body>
</html>
