<!DOCTYPE html>

<html lang="zh-TW">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <title>Alaska Trip 2026</title>

    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

    <script src="https://cdn.tailwindcss.com"></script>

    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    

    <style>

        :root {

            --alaska-blue: #B9D9EB;

            --bg-ice: #F8FBFF;

        }

        body {

            font-family: 'Noto Sans TC', sans-serif;

            background-color: var(--alaska-blue);

            margin: 0; padding: 0;

            -webkit-font-smoothing: antialiased;

        }

        /* 頁首 Banner */

        .banner-container {

            width: 100%;

            height: 420px;

            position: relative;

            z-index: 1;

        }

        .banner-img {

            width: 100%; height: 100%;

            object-fit: cover;

            object-position: center 30%;

        }

        /* 主內容圓弧與負邊距 */

        .content-layer {

            position: relative;

            z-index: 10;

            margin-top: -60px;

            background-color: var(--bg-ice);

            border-radius: 40px 40px 0 0;

            min-height: 100vh;

            padding-bottom: 100px;

            box-shadow: 0 -10px 30px rgba(0,0,0,0.05);

        }

        /* 側邊浮動 Tab 按鈕 */

        .tab-group {

            position: absolute;

            top: 25px;

            right: 15px;

            z-index: 50;

            display: flex;

            flex-direction: column;

            gap: 12px;

        }

        .tab-item {

            width: 48px; height: 48px;

            border-radius: 16px;

            background: rgba(255, 255, 255, 0.85);

            backdrop-filter: blur(8px);

            display: flex; items-center: center; justify-content: center;

            color: #64748b;

            box-shadow: 0 4px 10px rgba(0,0,0,0.1);

            transition: all 0.2s;

        }

        .tab-item.active { background: #3B82F6; color: white; }

        

        /* 日期滑動選單 */

        .date-slider {

            display: flex;

            overflow-x: auto;

            gap: 10px;

            padding: 20px 0;

            -webkit-overflow-scrolling: touch;

        }

        .date-slider::-webkit-scrollbar { display: none; }

        .date-box {

            flex: 0 0 65px;

            height: 90px;

            display: flex;

            flex-direction: column;

            align-items: center;

            justify-content: center;

            border-radius: 20px;

            transition: all 0.3s;

        }

        .date-box.active {

            background: #3B82F6;

            color: white;

            box-shadow: 0 8px 15px rgba(59, 130, 246, 0.2);

            transform: translateY(-4px);

        }

        

        input::-webkit-outer-spin-button,

        input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

    </style>

</head>

<body>

    <div id="app" class="max-w-md mx-auto relative bg-white">

        

        <header class="banner-container">

            <img src="alaska_pic.jpg" class="banner-img">

            <div class="tab-group">

                <button v-for="t in tabs" @click="currentTab = t.id" 

                    :class="['tab-item', currentTab === t.id ? 'active' : '']">

                    <i :class="['bi', t.icon, 'text-xl']"></i>

                </button>

            </div>

        </header>



        <main class="content-layer px-6">

            

            <div v-if="currentTab === 'itinerary'">

                <div class="pt-8 mb-2 flex justify-between items-center">

                    <div class="flex items-center gap-3">

                        <i class="bi bi-geo-alt-fill text-2xl text-blue-500"></i>

                        <h2 class="text-xl font-bold text-slate-800">每日行程</h2>

                    </div>

                </div>



                <div class="date-slider">

                    <div v-for="d in dateList" :key="d.full" 

                        @click="selectedDate = d.full"

                        :class="['date-box', selectedDate === d.full ? 'active' : 'bg-white text-slate-400 border border-slate-100']">

                        <span class="text-[11px] font-bold uppercase">{{ d.weekday }}</span>

                        <span class="text-xl font-bold">{{ d.day }}</span>

                    </div>

                </div>



                <div class="mt-4 space-y-4">

                    <div v-if="currentSchedule.length === 0" class="text-center py-20 text-slate-300">

                        <i class="bi bi-calendar-x text-5xl"></i>

                        <p class="mt-2 text-sm">這天暫無安排行程</p>

                    </div>

                    

                    <div v-for="(item, idx) in currentSchedule" :key="idx" 

                         class="bg-white border border-slate-100 rounded-3xl p-5 shadow-sm active:scale-95 transition"

                         @click="navTo(item.location)">

                        <div class="flex justify-between items-start mb-2">

                            <span class="bg-blue-50 text-blue-500 text-[10px] px-2 py-1 rounded-lg font-bold">

                                {{ item.type }}

                            </span>

                            <span class="text-xs text-slate-400 font-medium">{{ item.time }}</span>

                        </div>

                        <h3 class="text-lg font-bold text-slate-800">{{ item.name }}</h3>

                        <p class="text-xs text-slate-500 mt-1">{{ item.note }}</p>

                    </div>

                </div>

            </div>



            <div v-if="currentTab === 'info'" class="pt-10 space-y-8">

                <section>

                    <div class="flex items-center gap-2 mb-6">

                        <div class="w-2 h-6 bg-blue-500 rounded-full"></div>

                        <h2 class="text-xl font-bold text-slate-800">匯率換算 (USD)</h2>

                    </div>

                    

                    <div class="bg-white rounded-3xl p-6 shadow-sm border border-slate-100">

                        <div class="relative mb-6">

                            <label class="text-[11px] font-bold text-blue-500 uppercase tracking-widest mb-2 block ml-1">輸入美金金額</label>

                            <div class="flex items-center bg-slate-50 rounded-2xl p-4 border border-slate-100">

                                <span class="text-2xl mr-2 text-slate-400">$</span>

                                <input type="number" v-model="usdInput" 

                                    class="w-full bg-transparent border-none text-2xl font-bold focus:ring-0 text-slate-700" 

                                    placeholder="0.00">

                                <span class="text-sm font-bold text-slate-400">USD</span>

                            </div>

                        </div>



                        <div class="grid grid-cols-1 gap-3">

                            <div class="flex justify-between items-center bg-blue-50/50 p-5 rounded-2xl border border-blue-100/50">

                                <span class="text-slate-500 font-medium text-sm">港幣 HKD</span>

                                <span class="text-xl font-bold text-blue-600">≈ {{ (usdInput * 7.82).toFixed(2) }}</span>

                            </div>

                            <div class="flex justify-between items-center bg-blue-50/50 p-5 rounded-2xl border border-blue-100/50">

                                <span class="text-slate-500 font-medium text-sm">加幣 CAD</span>

                                <span class="text-xl font-bold text-blue-600">≈ {{ (usdInput * 1.36).toFixed(2) }}</span>

                            </div>

                        </div>

                    </div>

                </section>

            </div>

            

            <div v-if="currentTab === 'shop' || currentTab === 'money'" class="pt-20 text-center text-slate-300">

                <i class="bi bi-hammer text-5xl"></i>

                <p class="mt-4">功能開發中</p>

            </div>



        </main>



        <button class="fixed bottom-8 right-8 w-14 h-14 bg-blue-500 text-white rounded-full shadow-2xl flex items-center justify-center text-2xl z-50 active:scale-90 transition">

            <i class="bi bi-plus-lg"></i>

        </button>

    </div>



    <script>

        const { createApp, ref, computed } = Vue;



        createApp({

            setup() {

                const currentTab = ref('itinerary');

                const selectedDate = ref('2026-06-11');

                const usdInput = ref(null);



                const tabs = [

                    { id: 'itinerary', icon: 'bi-geo-alt-fill' },

                    { id: 'info', icon: 'bi-info-circle-fill' },

                    { id: 'shop', icon: 'bi-basket-fill' },

                    { id: 'money', icon: 'bi-cash-coin' }

                ];



                const dateList = [

                    { weekday: 'Thu', day: '11', full: '2026-06-11' },

                    { weekday: 'Fri', day: '12', full: '2026-06-12' },

                    { weekday: 'Sat', day: '13', full: '2026-06-13' },

                    { weekday: 'Sun', day: '14', full: '2026-06-14' },

                    { weekday: 'Mon', day: '15', full: '2026-06-15' },

                    { weekday: 'Tue', day: '16', full: '2026-06-16' },

                    { weekday: 'Wed', day: '17', full: '2026-06-17' },

                    { weekday: 'Thu', day: '18', full: '2026-06-18' },

                    { weekday: 'Fri', day: '19', full: '2026-06-19' },

                    { weekday: 'Sat', day: '20', full: '2026-06-20' }

                ];



                const schedule = {

                    '2026-06-11': [

                        { type: '航班', name: '抵達溫哥華 (AC 107)', time: '11:00 AM', location: 'YVR Airport', note: 'Candy 抵達溫哥華' }

                    ],

                    '2026-06-12': [

                        { type: '登船', name: 'Holland America Cruise', time: '12:00 PM', location: 'Canada Place', note: '全員上船' }

                    ],

                    '2026-06-20': [

                        { type: '航班', name: '溫哥華回多倫多 (AC 114)', time: '02:00 PM', location: 'YVR Airport', note: '六人回航' }

                    ]

                };



                const currentSchedule = computed(() => schedule[selectedDate.value] || []);



                const navTo = (loc) => {

                    window.open(`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(loc)}`, '_blank');

                };



                return { currentTab, tabs, dateList, selectedDate, currentSchedule, navTo, usdInput };

            }

        }).mount('#app');

    </script>

</body>

</html>
